---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ audiobookshelf_owner }}"] }

- name: Compose
  vars:
    compose_dir: "{{ audiobookshelf_compose_dir | default(bookshelf_const_compose_dir + '/audiobookshelf', true) }}"
    conf_dir: "{{ audiobookshelf_conf_dir }}"
    data_dir: "{{ audiobookshelf_data_dir }}"
    service_state: "{{ audiobookshelf_enabled | ternary('present', 'absent') }}"
    the_user: "{{ getent_passwd[audiobookshelf_user] }}"
    user_uid: "{{ the_user.1 }}"
    user_gid: "{{ the_user.2 }}"
  block:
    - name: Owner
      become: true
      become_user: "{{ audiobookshelf_owner }}"
      block:
        - name: Create compose directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0700'
          loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

        - name: Create compose files
          ansible.builtin.template:
            src: "{{ item }}.j2"
            dest: "{{ compose_dir }}/{{ item }}"
            mode: '0600'
          loop:
            - serve.json    # <- Must be first
            - compose.yaml
            - extra.env
            - main.env
            - secret.env
          register: audiobookshelf_compose_files_result

        - name: Create service assets directories
          ansible.builtin.file:
            path: "{{ conf_dir }}/{{ item }}"
            state: directory
            mode: '0700'
          loop: [config]

    - name: Create data directory
      ansible.builtin.file:
        path: "{{ data_dir }}"
        state: directory
        mode: "{{ omit }}"
      become: true
      become_user: "{{ audiobookshelf_user }}"

    - name: Ensure service user directories ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ user_uid }}"
        group: "{{ user_gid }}"
      loop: ["{{ conf_dir }}/config", "{{ data_dir }}"]
      become: true
      become_user: root

    - name: Owner
      become: true
      become_user: "{{ audiobookshelf_owner }}"
      block:
        - name: Apply service state
          community.docker.docker_compose_v2:
            project_src: "{{ compose_dir }}"
            state: "{{ service_state }}"
            remove_orphans: true
          register: audiobookshelf_service_state

        - name: Restart service
          community.docker.docker_compose_v2:
            project_src: "{{ compose_dir }}"
            state: restarted
            remove_orphans: true
          when:
            - audiobookshelf_enabled and not audiobookshelf_service_state.changed
            - audiobookshelf_tailscaled and audiobookshelf_compose_files_result.results[0].changed

        - name: Create note
          ansible.builtin.import_role: { name: bookshelf-note }
          # noqa: var-naming[no-role-prefix]
          vars: { src: notes.md.j2, dest: audiobookshelf-service.md, present: "{{ audiobookshelf_enabled }}" }

- name: Mark done
  ansible.builtin.set_fact:
    audiobookshelf_done: true
