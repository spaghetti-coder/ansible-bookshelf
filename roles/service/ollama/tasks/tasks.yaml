---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ ollama_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ ollama_owner }}"
  vars:
    compose_dir: "{{ ollama_compose_dir | default(bookshelf_const_compose_dir + '/ollama', true) }}"
    conf_dir: "{{ ollama_conf_dir }}"
    service_state: "{{ ollama_enabled | ternary('present', 'absent') }}"
  block:
    - name: Create compose directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

    - name: Create compose files
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: "0600"
      loop:
        - ts-serve.json # <- For the first 2 files order matters
        - compose.yaml
        - main.env
        - secret.env
      register: ollama_compose_files_result

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      register: ollama_service_state

    - name: Restart service
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: restarted
        remove_orphans: true
      when:
        - ollama_enabled and not ollama_service_state.changed
        - ollama_tailscaled and ollama_compose_files_result.results[1].changed

    - name: Create helper scripts
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: "0755"
      loop:
        - ollama.sh
        - ollama-cm.sh
      register: ollama_helpers_state # <- Trap to have real path for root

    - name: List models
      ansible.builtin.shell: # noqa: risky-shell-pipe
        cmd: >
          {{ ollama_script.path | default(ollama_script.dest) }} list
          | tail -n +2 | sort -n | cut -d' ' -f1 2>/dev/null
      vars:
        ollama_script: "{{ ollama_helpers_state.results[0] }}"
      changed_when: false
      register: ollama_models_installed

    - name: Install models
      ansible.builtin.command:
        argv:
          - "{{ ollama_script.path | default(ollama_script.dest) }}"
          - pull
          - "{{ item }}"
      when: item not in present
      vars:
        ollama_script: "{{ ollama_helpers_state.results[0] }}"
        required: "{{ ollama_models | default([], true) }}"
        present: "{{ ollama_models_installed.stdout_lines | default([], true) }}"
      loop: "{{ required }}"
      changed_when: required | difference(present) | length > 0

- name: Install helper script
  ansible.builtin.file:
    src: "{{ script_path }}"
    path: /usr/local/bin/{{ script_path | basename }}
    state: link
  vars:
    script_path: "{{ item.path | default(item.dest) }}"
  loop: "{{ ollama_helpers_state.results }}"
  loop_control:
    label: "{{ script_path }}"
  become: true
  become_user: root

- name: Mark done
  ansible.builtin.set_fact:
    ollama_done: true
