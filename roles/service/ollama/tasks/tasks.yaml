---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ ollama_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ ollama_owner }}"
  vars:
    compose_dir: "{{ ollama_compose_dir | default(bookshelf_const_compose_dir + '/ollama', true) }}"
    conf_dir: "{{ ollama_conf_dir }}"
    service_state: "{{ ollama_enabled | ternary('present', 'absent') }}"
  block:
    - name: Create compose directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

    - name: Create compose files
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: '0600'
      loop:
        - ts-serve.json   # <- For the first 2 files order matters
        - compose.yaml
        - main.env
        - secret.env
      register: ollama_compose_files_result

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      register: ollama_service_state

    - name: Restart service
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: restarted
        remove_orphans: true
      when:
        - ollama_enabled and not ollama_service_state.changed
        - ollama_tailscaled and ollama_compose_files_result.results[1].changed

    - name: Create ollama script
      ansible.builtin.template:
        src: ollama.sh.j2
        dest: "{{ compose_dir }}/ollama.sh"
        mode: '0755'
      register: ollama_script_state   # <- Trap to have real path for root

    - name: List models
      ansible.builtin.shell:  # noqa: risky-shell-pipe
        cmd: >
          {{ ollama_script_state.path | default(ollama_script_state.dest) }} list
          | tail -n +2 | sort -n | cut -d' ' -f1 2>/dev/null
      changed_when: false
      register: ollama_models_installed

    - name: Install models
      ansible.builtin.command:
        argv:
          - "{{ ollama_script_state.path | default(ollama_script_state.dest) }}"
          - pull
          - "{{ item }}"
      vars:
        present: "{{ ollama_models_installed.stdout_lines | default([], true) }}"
        absent: "{{ ollama_models | default([], true) | difference(present) }}"
      changed_when: true
      loop: "{{ absent }}"

- name: Install helper script
  ansible.builtin.file:
    src: "{{ ollama_script_state.path | default(ollama_script_state.dest) }}"
    path: /usr/local/bin/{{ ollama_global_script | basename }}
    state: link
  become: true
  become_user: root

- name: Mark done
  ansible.builtin.set_fact:
    ollama_done: true
