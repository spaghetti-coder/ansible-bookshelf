---
- name: Toolbelt
  ansible.builtin.import_role: { name: toolbelt }
  vars:
    toolbelt_pick: ['tar']  # <- 'unarchive' module requirement
    toolbelt_exclude: []    # <- Ensure it's not excluded somewhere else

- name: Get currently installed version
  ansible.builtin.command:
    argv: ["{{ llama_swap_dir }}/llama-swap", '--version']
  register: llama_swap_version_result
  failed_when: false
  changed_when: false

- name: Install
  become: true
  block:
    - name: Create directory
      ansible.builtin.file:
        path: "{{ llama_swap_dir }}"
        state: directory
        mode: '0755'

    - name: Install
      ansible.builtin.unarchive:
        src: "{{ llama_swap_dl_url }}"
        dest: "{{ llama_swap_dir }}"
        owner: root
        group: root
        # extra_opts:
        #   - --strip-components=1
        remote_src: true
      vars:
        stdout_version: " {{ llama_swap_version_result.stdout_lines | first | default('') }} " # <- Embrace with spaces
        desired_version: " v{{ _llama_swap_version }} "
      when: 'desired_version not in stdout_version'
      register: llama_swap_install_state

    - name: Create symlinks
      ansible.builtin.file:
        path: /usr/bin/{{ item }}
        src: "{{ llama_swap_dir }}/{{ item }}"
        state: link
      loop:
        - llama-swap

    - name: Create env file
      ansible.builtin.copy:
        content: "{{ llama_swap_env | default('', true) }}"
        dest: /root/llama-swap.env
        mode: '0600'
      register: llama_swap_env_state

    - name: Create config
      ansible.builtin.copy:
        content: "{{ llama_swap_config }}"
        dest: "{{ llama_swap_dir }}/config.yaml"
        mode: '0755'

    - name: Create service
      ansible.builtin.copy:
        content: "{{ llama_swap_service }}"
        dest: /etc/systemd/system/llama-swap.service
        mode: '0755'
      register: llama_swap_service_state

    - name: Apply service state
      ansible.builtin.systemd_service:
        name: llama-swap.service
        daemon_reload: "{{ service_changed }}"
        state: "{{ service_state }}"
        enabled: true
      vars:
        service_changed: "{{ llama_swap_service_state.changed }}"
        service_state: "{{ (
            service_changed
            or llama_swap_install_state.changed
            or llama_swap_env_state.changed
          ) | ternary('restarted', 'started') }}"

- name: Mark done
  ansible.builtin.set_fact:
    llama_swap_done: true
