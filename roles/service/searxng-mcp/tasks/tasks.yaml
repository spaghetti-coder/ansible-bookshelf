---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ searxng_mcp_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ searxng_mcp_owner }}"
  vars:
    compose_dir: "{{ searxng_mcp_compose_dir | default(bookshelf_const_compose_dir + '/searxng-mcp', true) }}"
    conf_dir: "{{ searxng_mcp_conf_dir }}"
    service_state: "{{ searxng_mcp_enabled | ternary('present', 'absent') }}"
  block:
    - name: Create compose directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

    - name: Create compose files
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: '0600'
      loop:
        - ts-serve.json
        - compose.yaml
        - main.env
        - secret.env
      register: searxng_mcp_compose_files_result

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      register: searxng_mcp_service_state

    - name: Restart service
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: restarted
        remove_orphans: true
      when:
        - searxng_mcp_enabled and not searxng_mcp_service_state.changed
        - searxng_mcp_tailscaled and searxng_mcp_compose_files_result.results[0].changed

    - name: Create note
      ansible.builtin.import_role: { name: bookshelf-note }
      # noqa: var-naming[no-role-prefix]
      vars: { src: notes.md.j2, dest: searxng-mcp-service.md, present: "{{ searxng_mcp_enabled }}" }

- name: Mark done
  ansible.builtin.set_fact:
    searxng_mcp_done: true
