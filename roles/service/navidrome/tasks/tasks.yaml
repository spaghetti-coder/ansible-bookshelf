---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ navidrome_owner }}"] }

- name: Compose
  vars:
    compose_dir: "{{ navidrome_compose_dir | default(bookshelf_const_compose_dir + '/navidrome', true) }}"
    conf_dir: "{{ navidrome_conf_dir }}"
    data_dir: "{{ navidrome_data_dir }}"
    extra_dir: "{{ navidrome_extra_dir }}"
    service_state: "{{ navidrome_enabled | ternary('present', 'absent') }}"
    the_user: "{{ getent_passwd[navidrome_user] }}"
    user_uid: "{{ the_user.1 }}"
    user_gid: "{{ the_user.2 }}"
  block:
    - name: Owner
      become: true
      become_user: "{{ navidrome_owner }}"
      block:
        - name: Create compose directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0700'
          loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

        - name: Create compose files
          ansible.builtin.template:
            src: "{{ item }}.j2"
            dest: "{{ compose_dir }}/{{ item }}"
            mode: '0600'
          loop:
            - serve.json    # <- Must be first
            - compose.yaml
            - extra.env
            - main.env
            - secret.env
          register: navidrome_compose_files_result

        - name: Create service assets directories
          ansible.builtin.file:
            path: "{{ conf_dir }}/{{ item }}"
            state: directory
            mode: '0700'
          loop: [config]

    - name: Data directories
      vars:
        data_dirs: "{{ [data_dir] + (extra_dir | ternary([extra_dir], [])) }}"
      block:
        - name: Create data directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: "{{ omit }}"
          loop: "{{ data_dirs }}"
          become: true
          become_user: "{{ navidrome_user }}"

        - name: Ensure service user directories ownership
          ansible.builtin.file:
            path: "{{ item }}"
            owner: "{{ user_uid }}"
            group: "{{ user_gid }}"
          loop: "{{ data_dirs + [conf_dir + '/config'] }}"
          become: true
          become_user: root

    - name: Owner
      become: true
      become_user: "{{ navidrome_owner }}"
      block:
        - name: Apply service state
          community.docker.docker_compose_v2:
            project_src: "{{ compose_dir }}"
            state: "{{ service_state }}"
            remove_orphans: true
          register: navidrome_service_state

        - name: Restart service
          community.docker.docker_compose_v2:
            project_src: "{{ compose_dir }}"
            state: restarted
            remove_orphans: true
          when:
            - navidrome_enabled and not navidrome_service_state.changed
            - navidrome_tailscaled and navidrome_compose_files_result.results[0].changed

        - name: Create note
          ansible.builtin.import_role: { name: bookshelf-note }
          # noqa: var-naming[no-role-prefix]
          vars: { src: notes.md.j2, dest: navidrome-service.md, present: "{{ navidrome_enabled }}" }

- name: Mark done
  ansible.builtin.set_fact:
    navidrome_done: true
