---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ hedgedoc_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ hedgedoc_owner }}"
  vars:
    compose_dir: "{{ hedgedoc_compose_dir | default(bookshelf_const_compose_dir + '/hedgedoc', true) }}"
    conf_dir: "{{ hedgedoc_conf_dir }}"
    service_state: "{{ hedgedoc_enabled | ternary('present', 'absent') }}"
    the_user: "{{ getent_passwd[hedgedoc_owner] }}"
    user_uid: "{{ the_user.1 }}"
    user_gid: "{{ the_user.2 }}"
  block:
    - name: Create compose and service assets directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

    - name: Create compose files
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: '0600'
      loop:
        - compose.yaml
        - extra.env
        - main.env

    - name: Create service assets directories
      ansible.builtin.file:
        path: "{{ conf_dir }}/{{ item }}"
        state: directory
        mode: '0700'
        owner: "{{ user_uid }}"
        group: "{{ user_gid }}"
      loop: [config, uploads]
      become: true
      become_user: root

    - name: Create config.json
      ansible.builtin.copy:
        src: config.json
        dest: "{{ conf_dir }}/config/config.json"
        mode: '0600'
      register: hedgedoc_config_state

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      register: hedgedoc_service_state

    - name: Restart service
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: restarted
        remove_orphans: true
      when:
        - hedgedoc_enabled and not hedgedoc_service_state.changed
        - hedgedoc_config_state.changed

- name: Mark done
  ansible.builtin.set_fact:
    hedgedoc_done: true
