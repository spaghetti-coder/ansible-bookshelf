---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ searxng_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ searxng_owner }}"
  vars:
    compose_dir: "{{ searxng_compose_dir | default(bookshelf_const_compose_dir + '/searxng', true) }}"
    conf_dir: "{{ searxng_conf_dir }}"
    service_state: "{{ searxng_enabled | ternary('present', 'absent') }}"
  block:
    - name: Create compose directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

    - name: Create compose files
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: '0600'
      loop:
        - ts-serve.json    # <- Must be first
        - compose.yaml
        - main.env
        - secret.env
      register: searxng_compose_files_result

    - name: Create config file
      ansible.builtin.copy:
        content: |
          {{ searxng_settings }}
        dest: "{{ compose_dir }}/settings.yaml"
        mode: '0644'
      register: searxng_config_file_result

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      register: searxng_service_state

    - name: Restart service
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: restarted
        remove_orphans: true
      when:
        - searxng_enabled and not searxng_service_state.changed
        - (searxng_tailscaled and searxng_compose_files_result.results[0].changed)
          or searxng_config_file_result.changed

    - name: Create note
      ansible.builtin.import_role: { name: bookshelf-note }
      # noqa: var-naming[no-role-prefix]
      vars: { src: notes.md.j2, dest: searxng-service.md, present: "{{ searxng_enabled }}" }

- name: Mark done
  ansible.builtin.set_fact:
    searxng_done: true
