[*]
; threads = 12
batch-size = 2048
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
mlock = true
jinja = true
port = 8080
; gpu-layers = all
; models-max = 1

[Qwen3.6-dev-Q6_K_XL:35b-262k]
; ~~~ Basic ~~~
hf-repo = unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-Q6_K_XL
fit = on
fit-target = 256
; ~~~ Context / cache ~~~
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
; ~~~ MTP ~~~
spec-type = draft-mtp
spec-draft-n-max = 2
; ~~~ Coding ~~~
temperature = 0.6
top-p = 0.95
top-k = 20
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.0

