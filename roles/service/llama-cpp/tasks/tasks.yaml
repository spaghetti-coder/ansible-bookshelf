---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ llama_cpp_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ llama_cpp_owner }}"
  vars:
    compose_dir: "{{ llama_cpp_compose_dir | default(bookshelf_const_compose_dir + '/llama-cpp', true) }}"
    conf_dir: "{{ llama_cpp_conf_dir }}"
    service_state: "{{ llama_cpp_enabled | ternary('present', 'absent') }}"
  block:
    - name: Create compose directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

    - name: Create compose files
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: "0600"
      loop:
        - ts-serve.json # <- For the first 2 files order matters
        - compose.yaml
        - main.env
        - secret.env
      register: llama_cpp_compose_files_result

    - name: Create models.ini
      ansible.builtin.copy:
        content: "{{ llama_cpp_models | default('', true) }}"
        dest: "{{ compose_dir }}/models.ini"
        mode: "0644"
      register: llama_cpp_models_ini_result

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      register: llama_cpp_service_state

    - name: Restart service
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: restarted
        remove_orphans: true
      when:
        - llama_cpp_enabled and not llama_cpp_service_state.changed
        - (llama_cpp_tailscaled and llama_cpp_compose_files_result.results[1].changed)
          or llama_cpp_models_ini_result.changed

- name: Mark done
  ansible.builtin.set_fact:
    llama_cpp_done: true
