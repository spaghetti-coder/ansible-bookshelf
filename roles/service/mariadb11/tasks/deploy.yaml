---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ mariadb11_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ mariadb11_owner }}"
  vars:
    compose_dir: "{{ mariadb11_compose_dir | default(bookshelf_const_compose_dir + '/mariadb11', true) }}"
    # extra_envfile: "{{ mariadb11_extra_envfile }}"
    conf_dir: "{{ mariadb11_conf_dir }}"
    service_state: "{{ mariadb11_enabled | ternary('present', 'absent') }}"
  block:
    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop:
        - "{{ compose_dir }}"
        - "{{ conf_dir }}"

    - name: Create secret.env
      ansible.builtin.template:
        src: secret.env.j2
        dest: "{{ compose_dir }}/secret.env"
        mode: '0600'

    # - name: Remove obsolete extra.env
    #   ansible.builtin.file:
    #     path: "{{ compose_dir }}/extra.env"
    #     state: absent
    #   when: not extra_envfile

    # - name: Create extra.env
    #   ansible.builtin.template:
    #     src: "{{ extra_envfile }}"
    #     dest: "{{ compose_dir }}/extra.env"
    #     mode: '0600'
    #   when: extra_envfile

    - name: Create compose.yaml
      ansible.builtin.template:
        src: compose.yaml.j2
        dest: "{{ compose_dir }}/compose.yaml"
        mode: '0600'

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true

    - name: Create create-user.sh
      ansible.builtin.copy:
        src: create-user.sh
        dest: "{{ compose_dir }}/create-user.sh"
        mode: '0700'

- name: Mark done
  ansible.builtin.set_fact:
    mariadb11_deploy_done: true
