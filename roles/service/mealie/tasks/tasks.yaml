---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ mealie_owner }}"] }

- name: Compose
  become: true
  become_user: "{{ mealie_owner }}"
  vars:
    compose_dir: "{{ mealie_compose_dir | default(bookshelf_const_compose_dir + '/mealie', true) }}"
    conf_dir: "{{ mealie_conf_dir }}"
    service_state: "{{ mealie_enabled | ternary('present', 'absent') }}"
    the_user: "{{ getent_passwd[mealie_owner] }}"
    user_uid: "{{ the_user.1 }}"
    user_gid: "{{ the_user.2 }}"
  block:
    - name: Create compose directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

    - name: Create compose files
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ compose_dir }}/{{ item }}"
        mode: '0600'
      loop:
        - serve.json    # <- Must be first
        - compose.yaml
        - extra.env
        - main.env
        - secret.env
      register: mealie_compose_files_result

    - name: Create service assets directories
      ansible.builtin.file:
        path: "{{ conf_dir }}/{{ item }}"
        state: directory
        mode: '0700'
        owner: "{{ user_uid }}"
        group: "{{ user_gid }}"
      loop: [config]
      become: true
      become_user: root

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      register: mealie_service_state

    - name: Restart service
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: restarted
        remove_orphans: true
      when:
        - mealie_enabled and not mealie_service_state.changed
        - mealie_tailscaled and mealie_compose_files_result.results[0].changed

    - name: Create note
      ansible.builtin.import_role: { name: bookshelf-note }
      # noqa: var-naming[no-role-prefix]
      vars: { src: notes.md.j2, dest: mealie-service.md, present: "{{ mealie_enabled }}" }

- name: Mark done
  ansible.builtin.set_fact:
    mealie_done: true
