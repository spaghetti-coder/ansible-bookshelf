---
# VERSIONS:
#   * https://github.com/spaghetti-coder/tetris/pkgs/container/tetris
#   * => See tailscale role versions
# -----
tetris_managed: false
tetris_enabled: false
tetris_version:         # Leave blank to leverage bookshelf configuration
tetris_compose_dir:     # Unless you know ..., leave blank to leverage bookshelf configuration
tetris_conf_dir: ~/conf/tetris
tetris_owner: "{{ ansible_facts.user_id }}"
tetris_service_name: tetris
tetris_hostname: "{{ tetris_service_name }}"
tetris_vhost: "{{ tetris_service_name }}.domain.local"
# Can disable ports if plan to access only via tailnet or reverse-proxy
tetris_web_ui_port:     # Leave blank for bookshelf default, or '-1' to not expose the port
# Optional extra env vars, will affect both Tetris and Tailscale.
tetris_extra_env: |
  # ----------
  # MY_VAR=123
tetris_secrets_env: |   # "{{ lookup('template', playbook_dir + '/resources/tetris.secret.env.j2') }}"
  # Can be used to pass secret values to the config file
  # ----------
  # MY_SECRET=123
# WUD settings
tetris_wudded: true     # Watched by WUD
tetris_tag_rex:         # Leave blank to leverage bookshelf configuration
# ----------
# The following settings configure Tetris to run as a part of tailnet
#
# IMPORTANT 1: See IMPORTANTs in tailscale service description
tetris_tailscaled: false
tetris_ts_version:          # Leave blank to leverage bookshelf configuration
tetris_ts_service_name: "{{ tetris_service_name }}-ts"
tetris_ts_funnelled: false  # Expose to the world via TS funnel. Use with caution
# Hostname within tailnet
tetris_ts_hostname: "{{ tetris_service_name }}"
tetris_ts_auth_key:
