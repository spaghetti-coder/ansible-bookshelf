---
- name: Docker
  ansible.builtin.import_role: { name: docker }
  vars: { docker_users: ["{{ metube_owner }}"] }

- name: Compose
  vars:
    compose_dir: "{{ metube_compose_dir | default(bookshelf_const_compose_dir + '/metube', true) }}"
    conf_dir: "{{ metube_conf_dir }}"
    data_dir: "{{ metube_data_dir }}"
    service_state: "{{ metube_enabled | ternary('present', 'absent') }}"
    the_user: "{{ getent_passwd[metube_user] }}"
    user_uid: "{{ the_user.1 }}"
    user_gid: "{{ the_user.2 }}"
  block:
    - name: Owner
      become: true
      become_user: "{{ metube_owner }}"
      block:
        - name: Create compose directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0700'
          loop: ["{{ compose_dir }}", "{{ conf_dir }}"]

        - name: Create compose files
          ansible.builtin.template:
            src: "{{ item }}.j2"
            dest: "{{ compose_dir }}/{{ item }}"
            mode: '0600'
          loop:
            - compose.yaml
            - extra.env
            - main.env

        - name: Create service assets directories
          ansible.builtin.file:
            path: "{{ conf_dir }}/{{ item }}"
            state: directory
            mode: '0700'
          loop: [config]

    - name: Create data directory
      ansible.builtin.file:
        path: "{{ data_dir }}"
        state: directory
        mode: "{{ omit }}"
      become: true
      become_user: "{{ metube_user }}"

    - name: Ensure service user directories ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ user_uid }}"
        group: "{{ user_gid }}"
      loop: ["{{ conf_dir }}/config", "{{ data_dir }}"]
      become: true
      become_user: root

    - name: Apply service state
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dir }}"
        state: "{{ service_state }}"
        remove_orphans: true
      become: true
      become_user: "{{ metube_owner }}"

- name: Mark done
  ansible.builtin.set_fact:
    metube_done: true
