---
opencode_cli_managed: false
opencode_cli_configs: # <- opencode.jsonc to user
  # - user: "{{ ansible_facts.user_id }}"               # <- (REQUIRED, the rest is optional)
  #   config: "{{ lookup('file', 'opencode.jsonc') }}"  # <- See demo in files
  #   agents_md: "{{ lookup('file', 'AGENTS.md') }}"    # <- See demo in files
  #   # Plugins setup
  #   plugin_get_shit_done: false
  #   # plugin_graphify: false                # <- Currently user level setup is not supported
  #   # This requires envar for this user
  #   secrets: |  # <- (Optional) Will go to opencode.secret.sh under user envar.d
  #     export OPENAI_API_KEY=foobar
  #   # Only available for systemd based systems
  #   #   Health endpoint: http://<host>/global/health
  #   web:                                    # <- (Optional) Web server, all fields optional
  #     enabled: false                        # "{{ factum_os_family not in ['alpine'] }}"   # <- Not supported by Alpine
  #     port:                                 # <- Leave blank to leverage bookshelf defaults
  #     hostname:                             # <- Defaults to 127.0.0.1
  #     # This will be used for the service.
  #     # Not supported by service:
  #     #   - `export` prefix to variables
  #     #   - comments on the same line after variables
  #     secrets: |
  #       # Secrets from main user section must be duplicated
  #       OPENAI_API_KEY=foobar
  #       #
  #       # Password protect the web server (optional, but recommended). USERNAME defaults to 'opencode'. If no PASSWORD,
  #       # will be unprotected. This can be used with hostname != 127.0.0.1.
  #       # Another (IMO, better) strategy is to leave hostname = 127.0.0.1 and protect access on reverse proxy level.
  #       #
  #       # OPENCODE_SERVER_USERNAME=admin
  #       # OPENCODE_SERVER_PASSWORD=changeme
